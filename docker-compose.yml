version: "3.9"

services:
  app:
    build: .
    container_name: petflow_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: petflow_db
    environment:
      POSTGRES_DB: petflow
      POSTGRES_USER: petflow
      POSTGRES_PASSWORD: petflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: