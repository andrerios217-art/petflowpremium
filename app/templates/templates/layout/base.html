<!DOCTYPE html>
<html lang="pt-BR" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ system_name if system_name else "VectorPet" }}</title>

  <script>
    (function () {
      try {
        const themeKeys = [
          "petflow_theme",
          "theme",
          "color-theme",
          "darkMode",
          "modo_escuro",
          "tema",
        ];

        themeKeys.forEach((key) => {
          try {
            localStorage.removeItem(key);
          } catch (error) {}

          try {
            sessionStorage.removeItem(key);
          } catch (error) {}
        });
      } catch (error) {}

      try {
        document.documentElement.removeAttribute("data-theme");
        document.documentElement.classList.remove("dark", "theme-dark", "dark-mode", "modo-escuro");
      } catch (error) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/style.css" />
  {% block extra_head %}{% endblock %}

  <meta name="google" content="notranslate">
  <meta name="robots" content="notranslate">
<script id="vectorpet-forcar-fetch-https">
  (function () {
    const fetchOriginal = window.fetch;

    window.fetch = function (input, init) {
      try {
        if (typeof input === "string") {
          const hostHttp = "http://" + window.location.host;

          if (window.location.protocol === "https:" && input.startsWith(hostHttp)) {
            input = "https://" + window.location.host + input.slice(hostHttp.length);
          }
        }

        if (input instanceof Request) {
          const url = input.url || "";
          const hostHttp = "http://" + window.location.host;

          if (window.location.protocol === "https:" && url.startsWith(hostHttp)) {
            const novaUrl = "https://" + window.location.host + url.slice(hostHttp.length);
            input = new Request(novaUrl, input);
          }
        }
      } catch (erro) {
        console.warn("VectorPet HTTPS patch:", erro);
      }

      return fetchOriginal.call(this, input, init);
    };
  })();
</script>
</head>
<body>
  <div class="app-shell">
    {% include "layout/sidebar.html" %}

    <main class="main-content">
      <div class="topbar-global">
        <div class="topbar-global-left">
          <span class="topbar-global-label">{{ system_name if system_name else "VectorPet" }}</span>
        </div>
      </div>

      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="/static/js/app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll("a.nav-item").forEach(function (item) {
      const href = (item.getAttribute("href") || "").toLowerCase();
      const texto = (item.textContent || "").toLowerCase();

      if (
        href.includes("relatorio-vendas") ||
        href.includes("relatorios-vendas") ||
        texto.includes("relatório de vendas") ||
        texto.includes("relatorio de vendas")
      ) {
        item.remove();
      }

      if (href === "/precificacao" || href.includes("/precificacao")) {
        const icon = item.querySelector(".nav-icon");
        const text = item.querySelector(".nav-text");

        if (icon) {
          icon.textContent = "💲";
        }

        if (text) {
          text.textContent = "Precificação";
        }

        item.setAttribute("title", "Precificação");
      }
    });

    document.querySelectorAll(".logo-text").forEach(function (logo) {
      if ((logo.textContent || "").includes("Pet Flow Premium") || (logo.textContent || "").includes("PetFlow Premium")) {
        logo.textContent = "VectorPet";
      }
    });

    document.querySelectorAll("h1, h2, h3, p, span, small, strong").forEach(function (el) {
      if (!el || !el.childNodes || el.childNodes.length !== 1) {
        return;
      }

      const texto = el.textContent || "";

      if (texto.includes("Pet Flow Premium") || texto.includes("PetFlow Premium")) {
        el.textContent = texto.replaceAll("Pet Flow Premium", "VectorPet").replaceAll("PetFlow Premium", "VectorPet");
      }
    });
  });
</script>
</body>
</html>
