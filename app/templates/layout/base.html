<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Flow Premium</title>

  <script>
    (function () {
      try {
        const themeKeys = [
          "petflow_theme",
          "theme",
          "color-theme",
          "darkMode",
          "modo_escuro",
          "tema",
        ];

        themeKeys.forEach((key) => {
          try {
            localStorage.removeItem(key);
          } catch (error) {}

          try {
            sessionStorage.removeItem(key);
          } catch (error) {}
        });
      } catch (error) {}

      try {
        document.documentElement.removeAttribute("data-theme");
        document.documentElement.classList.remove("dark", "theme-dark", "dark-mode", "modo-escuro");
      } catch (error) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app-shell">
    {% include "layout/sidebar.html" %}

    <main class="main-content">
      <div class="topbar-global">
        <div class="topbar-global-left">
          <span class="topbar-global-label">Pet Flow Premium</span>
        </div>
      </div>

      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
