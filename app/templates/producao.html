{% extends "layout/base.html" %}

{% block content %}
<div class="pagina-producao" data-empresa-id="1">
  <div class="producao-topo">
    <div>
      <h1>Linha de Produção</h1>
      <p>Painel operacional do banho e tosa</p>
    </div>
    <button type="button" class="btn-atualizar" id="btn-atualizar-producao">
      Atualizar
    </button>
  </div>

  <div class="kanban">
    <div class="coluna">
      <h3>Pré-banho</h3>
      <div id="coluna-PRE_BANHO" class="cards"></div>
    </div>

    <div class="coluna">
      <h3>Pré-tosa</h3>
      <div id="coluna-PRE_TOSA" class="cards"></div>
    </div>

    <div class="coluna">
      <h3>Banho</h3>
      <div id="coluna-BANHO" class="cards"></div>
    </div>

    <div class="coluna">
      <h3>Finalização do banho</h3>
      <div id="coluna-FINALIZACAO_BANHO" class="cards"></div>
    </div>

    <div class="coluna">
      <h3>Tosa</h3>
      <div id="coluna-TOSA" class="cards"></div>
    </div>

    <div class="coluna">
      <h3>Secagem</h3>
      <div id="coluna-SECAGEM" class="cards"></div>
    </div>
  </div>
</div>

<div id="acao-producao-modal" class="modal-overlay hidden">
  <div class="modal-producao">
    <div class="modal-header">
      <div>
        <h2 id="acao-modal-titulo">Ação da etapa</h2>
        <p id="acao-modal-subtitulo">Preencha os dados para continuar.</p>
      </div>
      <button type="button" class="modal-close" id="fechar-acao-producao-modal">×</button>
    </div>

    <div class="modal-body">
      <div id="acao-producao-message" class="modal-message"></div>

      <input type="hidden" id="acao-producao-id" />
      <input type="hidden" id="acao-producao-coluna-atual" />
      <input type="hidden" id="acao-producao-tipo" />
      <input type="hidden" id="acao-producao-finaliza" />

      <div class="form-group">
        <label for="acao-funcionario">Funcionário responsável</label>
        <select id="acao-funcionario">
          <option value="">Selecione</option>
        </select>
      </div>

      <div class="form-group hidden" id="grupo-acao-banho">
        <label for="acao-banho-opcao">Ao finalizar o banho</label>
        <select id="acao-banho-opcao">
          <option value="">Selecione</option>
          <option value="FINALIZACAO_BANHO">Finalizar banho</option>
          <option value="SECAGEM">Enviar para secagem</option>
        </select>
      </div>

      <div class="form-group hidden" id="grupo-secagem">
        <label for="acao-secagem-tempo">Tempo de secagem (minutos)</label>
        <input type="number" id="acao-secagem-tempo" min="1" placeholder="Ex.: 20" />
      </div>

      <div class="form-group hidden" id="grupo-intercorrencias">
        <label>Intercorrências</label>

        <div class="check-grid">
          <label><input type="checkbox" id="intercorrencia-pulga" /> Pulga</label>
          <label><input type="checkbox" id="intercorrencia-carrapato" /> Carrapato</label>
          <label><input type="checkbox" id="intercorrencia-ferida" /> Ferida</label>
          <label><input type="checkbox" id="intercorrencia-irritacao" /> Irritação</label>
          <label><input type="checkbox" id="intercorrencia-outros" /> Outros</label>
        </div>
      </div>

      <div class="form-group hidden" id="grupo-intercorrencia-outros">
        <label for="acao-descricao-intercorrencia">Descreva a intercorrência</label>
        <textarea id="acao-descricao-intercorrencia" rows="3" placeholder="Descreva aqui"></textarea>
      </div>

      <div class="form-group hidden" id="grupo-observacoes-gerais">
        <label for="acao-observacoes-gerais">Observações gerais do atendimento</label>
        <textarea id="acao-observacoes-gerais" rows="4" placeholder="Descreva observações gerais do processo"></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn-secundario" id="cancelar-acao-producao">Cancelar</button>
      <button type="button" class="btn-primario" id="confirmar-acao-producao">Confirmar</button>
    </div>
  </div>
</div>

<style>
  .pagina-producao {
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
  }

  .producao-topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .producao-topo h1 {
    margin: 0;
  }

  .producao-topo p {
    margin: 4px 0 0;
    color: #6b7280;
  }

  .btn-atualizar {
    border: none;
    background: #111827;
    color: #fff;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(17, 24, 39, 0.12);
  }

  .kanban {
    display: grid;
    grid-template-columns: repeat(6, minmax(220px, 1fr));
    gap: 14px;
    width: 100%;
    overflow-x: hidden;
  }

  .coluna {
    background: #f8fafc;
    border: 1px solid #e5e7eb;
    border-radius: 18px;
    padding: 14px;
    min-width: 0;
    box-sizing: border-box;
  }

  .coluna h3 {
    margin: 0 0 14px;
    font-size: 15px;
    color: #111827;
    line-height: 1.2;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 140px;
  }

  .card-producao {
    border-radius: 16px;
    padding: 14px;
    border: 1px solid #e5e7eb;
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    min-width: 0;
    box-sizing: border-box;
  }

  .card-producao:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
  }

  .status-aguardando-producao {
    background: #fef3c7;
  }

  .status-execucao-producao {
    background: #dbeafe;
  }

  .prioridade-verde {
    border-left: 6px solid #16a34a;
  }

  .prioridade-vermelha {
    border-left: 6px solid #dc2626;
  }

  .prioridade-preta {
    border-left: 6px solid #111827;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }

  .card-codigo {
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 4px;
    word-break: break-word;
  }

  .card-titulo {
    font-size: 17px;
    font-weight: 800;
    color: #111827;
    margin: 0;
    word-break: break-word;
  }

  .badge-prioridade {
    font-size: 11px;
    font-weight: 800;
    padding: 6px 9px;
    border-radius: 999px;
    color: #fff;
    white-space: nowrap;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .badge-normal {
    background: #16a34a;
  }

  .badge-prioritario {
    background: #dc2626;
  }

  .badge-sem-prioridade {
    background: #111827;
  }

  .card-info {
    display: grid;
    gap: 6px;
    margin-bottom: 10px;
  }

  .card-info p {
    margin: 0;
    font-size: 13px;
    color: #1f2937;
    word-break: break-word;
  }

  .card-servicos {
    margin: 10px 0;
    padding-left: 18px;
  }

  .card-servicos li {
    margin-bottom: 3px;
    font-size: 13px;
    color: #374151;
    word-break: break-word;
  }

  .card-status-etapa {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.7);
    color: #1f2937;
    border-radius: 999px;
    padding: 7px 11px;
    font-size: 12px;
    font-weight: 800;
    margin-top: 4px;
    border: 1px solid rgba(17, 24, 39, 0.06);
    max-width: 100%;
  }

  .secagem-info {
    font-size: 13px;
    font-weight: 800;
    color: #92400e;
    margin-top: 10px;
    background: rgba(255, 255, 255, 0.72);
    padding: 8px 10px;
    border-radius: 10px;
    word-break: break-word;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .card-actions button {
    border: none;
    background: #111827;
    color: #fff;
    padding: 9px 11px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    flex: 1 1 auto;
    min-width: 110px;
  }

  .card-actions button.btn-secundario {
    background: #374151;
  }

  .card-actions button:hover,
  .btn-atualizar:hover,
  .btn-primario:hover,
  .btn-secundario:hover {
    opacity: 0.92;
  }

  .alerta-secagem {
    border: 2px solid #dc2626 !important;
    animation: shakeCard 0.65s infinite;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(17, 24, 39, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 9999;
  }

  .modal-producao {
    width: 100%;
    max-width: 620px;
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.18);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 16px;
    padding: 20px 22px 10px;
  }

  .modal-header h2 {
    margin: 0;
    color: #111827;
  }

  .modal-header p {
    margin: 6px 0 0;
    color: #6b7280;
  }

  .modal-close {
    border: none;
    background: transparent;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
  }

  .modal-body {
    padding: 10px 22px 20px;
  }

  .modal-footer {
    display: flex;
    justify-content: end;
    gap: 10px;
    padding: 16px 22px 22px;
  }

  .btn-primario,
  .btn-secundario {
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
  }

  .btn-primario {
    background: #111827;
    color: #fff;
  }

  .btn-secundario {
    background: #e5e7eb;
    color: #111827;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .form-group label {
    font-weight: 700;
    font-size: 14px;
    color: #111827;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    font-size: 14px;
    box-sizing: border-box;
    background: #fff;
  }

  .check-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .check-grid label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    color: #374151;
  }

  .modal-message {
    min-height: 20px;
    margin-bottom: 8px;
    color: #b91c1c;
    font-size: 14px;
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 1700px) {
    .kanban {
      grid-template-columns: repeat(3, minmax(240px, 1fr));
    }
  }

  @media (max-width: 1100px) {
    .kanban {
      grid-template-columns: repeat(2, minmax(240px, 1fr));
    }
  }

  @media (max-width: 720px) {
    .pagina-producao {
      padding: 14px;
    }

    .kanban {
      grid-template-columns: 1fr;
    }

    .coluna {
      padding: 12px;
    }

    .card-actions button {
      min-width: 100%;
    }

    .check-grid {
      grid-template-columns: 1fr;
    }
  }

  @keyframes shakeCard {
    0% { transform: translateX(0); }
    20% { transform: translateX(-2px); }
    40% { transform: translateX(2px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
    100% { transform: translateX(0); }
  }
</style>

<script src="/static/js/producao.js"></script>
{% endblock %}
