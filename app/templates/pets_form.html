{% extends "layout/base.html" %}

{% block content %}
<section class="page-header">
  <div>
    <h1>Novo Pet</h1>
    <p>Cadastro inicial do pet.</p>
  </div>
</section>

<section class="glass-card">
  <form id="pet-form" class="form-grid">
    <div class="form-group">
      <label>ID da Empresa</label>
      <input type="number" id="empresa_id" value="1" required />
    </div>

    <div class="form-group">
      <label>ID do Cliente</label>
      <input type="number" id="cliente_id" placeholder="Ex: 1" required />
    </div>

    <div class="form-group">
      <label>Nome do pet</label>
      <input type="text" id="nome" required />
    </div>

    <div class="form-group">
      <label>Data de nascimento</label>
      <input type="date" id="nascimento" />
    </div>

    <div class="form-group">
      <label>Raça</label>
      <input type="text" id="raca" />
    </div>

    <div class="form-group">
      <label>Sexo</label>
      <select id="sexo">
        <option value="">Selecione</option>
        <option value="macho">Macho</option>
        <option value="femea">Fêmea</option>
      </select>
    </div>

    <div class="form-group">
      <label>Temperamento</label>
      <select id="temperamento">
        <option value="">Selecione</option>
        <option value="docil">Dócil</option>
        <option value="normal">Normal</option>
        <option value="bravo">Bravo</option>
        <option value="medroso">Medroso</option>
      </select>
    </div>

    <div class="form-group">
      <label>Peso</label>
      <input type="number" step="0.01" id="peso" />
    </div>

    <div class="form-group">
      <label>Porte</label>
      <select id="porte">
        <option value="">Selecione</option>
        <option value="G1">G1</option>
        <option value="G2">G2</option>
        <option value="G3">G3</option>
        <option value="G4">G4</option>
        <option value="G5">G5</option>
      </select>
    </div>

    <div class="form-group full-width">
      <label>Observações</label>
      <input type="text" id="observacoes" />
    </div>

    <div class="form-group checkbox-group">
      <label><input type="checkbox" id="pode_perfume" checked /> Pode perfume</label>
      <label><input type="checkbox" id="pode_acessorio" checked /> Pode acessório</label>
      <label><input type="checkbox" id="castrado" /> Castrado</label>
    </div>

    <div class="form-actions">
      <button type="submit" class="primary-btn">Salvar Pet</button>
      <a href="/pets" class="secondary-btn no-underline">Voltar</a>
    </div>

    <div id="pet-message" class="form-message"></div>
  </form>
</section>

<script>
  document.getElementById("pet-form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const payload = {
      empresa_id: Number(document.getElementById("empresa_id").value),
      cliente_id: Number(document.getElementById("cliente_id").value),
      nome: document.getElementById("nome").value,
      nascimento: document.getElementById("nascimento").value || null,
      raca: document.getElementById("raca").value || null,
      sexo: document.getElementById("sexo").value || null,
      temperamento: document.getElementById("temperamento").value || null,
      peso: document.getElementById("peso").value ? Number(document.getElementById("peso").value) : null,
      porte: document.getElementById("porte").value || null,
      observacoes: document.getElementById("observacoes").value || null,
      pode_perfume: document.getElementById("pode_perfume").checked,
      pode_acessorio: document.getElementById("pode_acessorio").checked,
      castrado: document.getElementById("castrado").checked,
      foto: null
    };

    const response = await fetch("/api/pets/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const msg = document.getElementById("pet-message");

    if (response.ok) {
      msg.innerText = "Pet salvo com sucesso.";
      setTimeout(() => {
        window.location.href = "/pets";
      }, 700);
    } else {
      const error = await response.json();
      msg.innerText = "Erro ao salvar pet.";
      console.error(error);
    }
  });
</script>
{% endblock %}
